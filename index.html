
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ECHO Miner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-bg: #020617;
        --color-surface: rgba(255, 255, 255, 0.04);
        --color-primary: #8B5CF6;
        --color-secondary: #2DD4BF;
        --color-accent: #C084FC;
        --blur-std: 16px;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--color-bg);
        color: #f8fafc;
        margin: 0;
        overflow: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0.03;
        z-index: 100;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      .glass {
        background: var(--color-surface);
        backdrop-filter: blur(var(--blur-std));
        -webkit-backdrop-filter: blur(var(--blur-std));
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .purple-glow {
        box-shadow: 0 0 40px rgba(139, 92, 246, 0.25);
      }
      .teal-glow {
        box-shadow: 0 0 30px rgba(45, 212, 191, 0.3);
      }
      .text-glow {
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      }
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      * {
        -webkit-tap-highlight-color: transparent;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spin-slow 12s linear infinite;
      }
      @keyframes pulse-ring {
        0% { transform: scale(0.9); opacity: 0; }
        50% { opacity: 0.3; }
        100% { transform: scale(1.3); opacity: 0; }
      }
      .animate-pulse-ring {
        animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes noise-shift {
        0%, 100% { background-position: 0% 0%; }
        20% { background-position: 10% 5%; }
        40% { background-position: -5% 15%; }
        60% { background-position: 15% -10%; }
        80% { background-position: -10% -5%; }
      }
      .noise-overlay {
        position: absolute;
        inset: 0;
        opacity: 0.05;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        animation: noise-shift 0.2s steps(4) infinite;
        pointer-events: none;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "next": "https://esm.sh/next@^16.1.6",
    "next/": "https://esm.sh/next@^16.1.6/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
